<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4eeff; /* Fond mauve très clair */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        h2 {
            color: #673ab7;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .form-group { margin-bottom: 1.2rem; text-align: left; }

        label {
            display: block;
            color: #512da8;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1c4e9;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #673ab7; box-shadow: 0 0 5px #d1c4e9; }

        button {
            width: 100%;
            padding: 12px;
            background: #673ab7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 1rem;
            transition: 0.3s ease;
        }
        button:hover { background: #512da8; transform: translateY(-1px); }

        .error {
            background: #ffebee;
            color: #e53935;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Authentification</h2>

    <div th:if="${param.error}" class="error">
        Nom d'utilisateur ou mot de passe incorrect.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Nom d'utilisateur :</label>
            <input type="text" name="username" placeholder="Entrez votre nom" required />
        </div>

        <div class="form-group">
            <label>Mot de passe :</label>
            <input type="password" name="password" placeholder="••••••••" required />
        </div>

        <button type="submit">Se connecter</button>
    </form>
</div>

</body>
</html>
