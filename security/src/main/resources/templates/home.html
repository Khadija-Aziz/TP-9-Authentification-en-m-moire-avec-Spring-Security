<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #f3f0ff; /* Mauve très clair */
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .card {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px;
        }
        h2 { color: #6a1b9a; margin-bottom: 20px; }
        p { color: #4a148c; margin-bottom: 30px; }
        .btn-logout {
            background-color: #7b1fa2; color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 100%;
        }
        .btn-logout:hover { background-color: #4a148c; }
    </style>
</head>
<body>
<div class="card">
    <h2>Page d'accueil</h2>
    <p>Bienvenue ! Vous êtes connecté.</p>
    <div class="nav-links">
        <a th:href="@{/user/dashboard}" class="dashboard-link">
            Accéder à l'espace User
        </a>
    </div>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}" class="dashboard-link">
            Accéder à l'espace Admin
        </a>
    </div>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn-logout">Se déconnecter</button>
    </form>
</div>
</body>
</html>
